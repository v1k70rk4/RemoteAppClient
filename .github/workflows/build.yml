name: build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # the release job needs this to publish a GitHub Release on tags

jobs:
  windows:
    name: Windows components (agent / updater / client)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Each project is already win-x64 + self-contained + single-file in its csproj; we pass the
      # flags explicitly too so the output is a single .exe regardless of csproj drift.
      - name: Publish agent + updater + client
        shell: pwsh
        run: |
          dotnet publish src/RemoteAgent/RemoteAgent.csproj                 -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish/agent
          dotnet publish src/RemoteAgent.Updater/RemoteAgent.Updater.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish/updater
          dotnet publish src/RemoteClient/RemoteClient.csproj               -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish/client

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            publish/agent/RemoteAgent.exe
            publish/updater/RemoteAgent.Updater.exe
            publish/client/RemoteClient.exe
          if-no-files-found: error

  server:
    name: Server (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish server
        run: dotnet publish src/RemoteServer/RemoteServer.csproj -c Release -r linux-x64 --self-contained -o publish/server

      - name: Package
        run: tar -C publish/server -czf RemoteServer-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: server-linux-x64
          path: RemoteServer-linux-x64.tar.gz
          if-no-files-found: error

  release:
    name: Release (on tag)
    needs: [ windows, server ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-x64/*
            artifacts/server-linux-x64/*
          generate_release_notes: true
