name: build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # the release job needs this to publish a GitHub Release on tags

# Run the Node-20 JS actions on Node 24 (silences the deprecation warning; GitHub forces this anyway).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows:
    name: Windows components (agent / updater / client / lite)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      # Separate steps so a failing publish is pinpointed (a combined step can mask the first failure).
      # Each csproj is already win-x64 + self-contained + single-file; the flags are repeated for safety.
      - name: Publish agent
        run: dotnet publish src/RemoteAgent/RemoteAgent.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Publish updater
        run: dotnet publish src/RemoteAgent.Updater/RemoteAgent.Updater.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Publish client
        run: dotnet publish src/RemoteClient/RemoteClient.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Publish Lite client
        run: dotnet publish src/RemoteClient.Lite/RemoteClient.Lite.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: List output
        shell: pwsh
        run: Get-ChildItem publish -Filter *.exe | ForEach-Object { '{0}  {1:N0} bytes' -f $_.Name, $_.Length }

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-x64
          path: |
            publish/RemoteAgent.exe
            publish/RemoteAgent.Updater.exe
            publish/RemoteClient.exe
            publish/RemoteClient.Lite.exe
          if-no-files-found: error

  server:
    name: Server (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Publish server
        run: dotnet publish src/RemoteServer/RemoteServer.csproj -c Release -r linux-x64 --self-contained -o publish/server

      - name: Package
        run: tar -C publish/server -czf RemoteServer-linux-x64.tar.gz .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-linux-x64
          path: RemoteServer-linux-x64.tar.gz
          if-no-files-found: error

  client-linux:
    name: Linux operator console (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Publish Linux console
        run: dotnet publish src/RemoteClient.Linux/RemoteClient.Linux.csproj -c Release -r linux-x64 --self-contained -o publish/client-linux

      # dpkg-deb ships with the Ubuntu runner; derive the package version from the csproj <Version>.
      - name: Build .deb
        run: |
          VER=$(grep -oP '(?<=<Version>)[^<]+' src/RemoteClient.Linux/RemoteClient.Linux.csproj | head -1 | cut -d. -f1-3)
          bash src/RemoteClient.Linux/packaging/build-deb.sh publish/client-linux "$VER" icon/RemoteAccessBlue_256x256.png .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-linux-deb
          path: remoteclient_*.deb
          if-no-files-found: error

  audit:
    name: NuGet vulnerability audit
    runs-on: windows-latest   # the solution has net10.0-windows projects; restore them natively
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore RemoteAppClient.slnx
      - name: Audit (fail on vulnerable packages)
        shell: bash
        run: |
          dotnet list RemoteAppClient.slnx package --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -q 'has the following vulnerable' audit.txt; then
            echo "::error::Vulnerable NuGet packages found (see log above)"; exit 1
          fi
          echo "No vulnerable NuGet packages."

  release:
    name: Release (on tag)
    needs: [ windows, server, client-linux, audit ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            artifacts/windows-x64/*
            artifacts/server-linux-x64/*
            artifacts/client-linux-deb/*
