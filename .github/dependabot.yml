# Dependabot: weekly update PRs for GitHub Actions and NuGet packages.
# Security updates are opened automatically once "Dependabot alerts" is enabled on the repo
# (Settings -> Code security). Grouped so each ecosystem lands as a single PR, not one per package.
version: 2
updates:
  # GitHub Actions referenced in .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]

  # NuGet packages across every project under src/
  - package-ecosystem: "nuget"
    directories:
      - "/src/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      nuget:
        patterns: ["*"]
    ignore:
      # EF Core's major must match the Pomelo provider's (currently 9; no stable Pomelo 10 yet).
      # Upgrade EF Core + Pomelo together as a deliberate change, not via routine bumps.
      - dependency-name: "Microsoft.EntityFrameworkCore*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Pomelo.EntityFrameworkCore.MySql"
        update-types: ["version-update:semver-major"]
